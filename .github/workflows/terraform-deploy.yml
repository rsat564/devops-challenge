name: "Terraform Deploy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev-eastus
          - test-eastus
          - prod-eastus
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

  # Auto-deploy to DEV on push (merge) to main
  push:
    branches: [main]
    paths:
      - "infrastructure/**"

  # Deploy to DEV on Pull Requests to main
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/**"

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  WORKING_DIR: infrastructure

concurrency:
  group: terraform-${{ github.head_ref || github.ref_name }}-${{ github.event.inputs.environment || 'dev-eastus' }}
  cancel-in-progress: false

jobs:
  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set-env.outputs.environments }}
      action: ${{ steps.set-action.outputs.action }}
    steps:
      - name: Set environments and actions
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environments=[\"${{ inputs.environment }}\"]" >> $GITHUB_OUTPUT
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
          else
            echo "environments=[\"dev-eastus\"]" >> $GITHUB_OUTPUT
            echo "action=apply" >> $GITHUB_OUTPUT
          fi
      
      - name: Set action
        id: set-action
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
          else
            echo "action=apply" >> $GITHUB_OUTPUT
          fi

  plan:
    name: "Plan - ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.action != 'destroy'
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.setup.outputs.environments) }}
      fail-fast: false
    environment: ${{ matrix.environment }}-plan
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Extract Environment Folder
        run: echo "ENV_FOLDER=$(echo ${{ matrix.environment }} | cut -d'-' -f1)" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environments/${{ env.ENV_FOLDER }}/${{ matrix.environment }}.backend.hcl
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: |
          # Use pipefail so 'tee' doesn't swallow the Terraform error
          set -o pipefail 
          terraform plan \
            -var-file=environments/${{ env.ENV_FOLDER }}/${{ matrix.environment }}.tfvars \
            -out=${{ matrix.environment }}.tfplan \
            -detailed-exitcode \
            -input=false \
            2>&1 | tee plan_output.txt
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ${{ env.WORKING_DIR }}/${{ matrix.environment }}.tfplan
          retention-days: 5

      - name: Fail on Error
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: "Apply - ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: [setup, plan]
    if: needs.setup.outputs.action == 'apply'
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.setup.outputs.environments) }}
      fail-fast: false
    environment: ${{ matrix.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ${{ env.WORKING_DIR }}

      - name: Extract Environment Folder
        run: echo "ENV_FOLDER=$(echo ${{ matrix.environment }} | cut -d'-' -f1)" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environments/${{ env.ENV_FOLDER }}/${{ matrix.environment }}.backend.hcl
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            ${{ matrix.environment }}.tfplan
        working-directory: ${{ env.WORKING_DIR }}

  destroy:
    name: "Destroy - ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.action == 'destroy'
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.setup.outputs.environments) }}
    environment: ${{ matrix.environment }}-destroy
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Extract Environment Folder
        run: echo "ENV_FOLDER=$(echo ${{ matrix.environment }} | cut -d'-' -f1)" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environments/${{ env.ENV_FOLDER }}/${{ matrix.environment }}.backend.hcl
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file=environments/${{ env.ENV_FOLDER }}/${{ matrix.environment }}.tfvars \
            -auto-approve \
            -input=false
        working-directory: ${{ env.WORKING_DIR }}